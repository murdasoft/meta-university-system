<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f0">
  <script src="js/theme.js"></script>
  <title>Регистрация — Портал вакансий</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="mock-job" data-page="auth" data-i18n-doc-title="auth.register.docTitle">
  <header class="mock-topbar">
    <div class="mock-topbar__inner">
      <a class="mock-brand" href="index.html">Портал вакансий</a>
      <div class="mock-top-actions" id="top-actions"></div>
    </div>
  </header>
  <div class="mock-demo-strip">
    <div class="mock-demo-strip__inner">
      <div class="mock-demo-nav-scroll">
        <nav class="mock-demo-nav" aria-label="Основные разделы">
          <a href="index.html" class="mock-nav-item">Главная</a>
          <a href="vacancies.html" class="mock-nav-item">Вакансии</a>
          <a href="contacts.html" class="mock-nav-item">Контакты</a>
          <a href="seeker-dashboard.html" class="mock-nav-item">Соискатель</a>
          <a href="employer-dashboard.html" class="mock-nav-item">Работодатель</a>
          <a href="admin-users.html" class="mock-nav-item">Админ-панель</a>
          <a href="login.html" class="mock-nav-item" id="nav-auth-link">Вход / Регистрация</a>
        </nav>
      </div>
    </div>
  </div>
  <main class="mock-main">
    <div class="mock-auth-wrap">
      <div class="mock-auth-card mock-auth-card--split">
        <h1 class="mock-page-title" data-i18n="auth.register.title">Регистрация</h1>
        <p class="mock-page-lead" data-i18n-html="auth.register.leadHtml"></p>

        <div class="mock-auth-role-tabs" role="tablist" aria-label="Тип учётной записи">
          <button type="button" class="mock-auth-role-tabs__btn is-active" role="tab" aria-selected="true" data-reg-tab="seeker">
            <span data-i18n="auth.register.tabSeeker">Я соискатель</span>
          </button>
          <button type="button" class="mock-auth-role-tabs__btn" role="tab" aria-selected="false" data-reg-tab="employer">
            <span data-i18n="auth.register.tabEmployer">Я работодатель</span>
          </button>
        </div>

        <input type="hidden" id="reg-role-value" name="role" value="seeker" autocomplete="off">

        <div class="mock-auth-hint-stack">
          <section id="reg-hint-seeker" class="mock-auth-hint-panel" role="tabpanel">
            <h2 class="mock-auth-hint-panel__title" data-i18n="auth.register.hintSeekerTitle">Учётная запись соискателя</h2>
            <div class="mock-auth-hint-panel__body" data-i18n-html="auth.register.hintSeekerHtml"></div>
          </section>
          <section id="reg-hint-employer" class="mock-auth-hint-panel" role="tabpanel" hidden>
            <h2 class="mock-auth-hint-panel__title" data-i18n="auth.register.hintEmployerTitle">Учётная запись организации</h2>
            <div class="mock-auth-hint-panel__body" data-i18n-html="auth.register.hintEmployerHtml"></div>
          </section>
        </div>

        <ul class="mock-messages" id="auth-messages" style="display:none;" role="status"></ul>
        <form class="mock-form mock-form--wide" id="form-register" method="post" action="#">
          <div>
            <label for="reg-user" data-i18n="auth.register.labelLogin">Логин</label>
            <input id="reg-user" name="username" type="text" required minlength="2" autocomplete="username" data-i18n-placeholder="auth.register.phLoginSeeker">
          </div>
          <div>
            <label for="reg-email" data-i18n="auth.register.labelEmail">E-mail</label>
            <input id="reg-email" name="email" type="email" autocomplete="email" data-i18n-placeholder="auth.register.phEmail">
          </div>
          <div>
            <label for="reg-pass" data-i18n="auth.register.labelPass">Пароль</label>
            <input id="reg-pass" name="password" type="password" required minlength="4" autocomplete="new-password">
          </div>
          <div id="reg-company-wrap" hidden aria-hidden="true">
            <p class="mock-field-opt" data-i18n="auth.register.optCompany">Только для работодателя</p>
            <label for="reg-company" data-i18n="auth.register.labelCompany">Название организации</label>
            <input id="reg-company" name="company" type="text" autocomplete="organization" data-i18n-placeholder="auth.register.phCompany">
            <p class="mock-field-hint" data-i18n="auth.register.helpCompany"></p>
          </div>
          <button type="submit" class="mock-btn mock-btn--primary" data-i18n="auth.register.submit">Зарегистрироваться</button>
        </form>
        <p class="mock-auth-footer">
          <span data-i18n="auth.register.footer">Уже зарегистрированы?</span>
          <a href="login.html" data-i18n="auth.register.footerLink">Войти</a>
        </p>
      </div>
    </div>
  </main>
  <footer class="mock-footer mock-footer--site" data-site-footer aria-label="Подвал сайта"></footer>
  <script src="js/i18n.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
