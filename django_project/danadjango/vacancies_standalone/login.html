<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f0">
  <script src="js/theme.js"></script>
  <title>Вход — Портал вакансий</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="mock-job" data-page="auth" data-i18n-doc-title="auth.login.docTitle">
  <header class="mock-topbar">
    <div class="mock-topbar__inner">
      <a class="mock-brand" href="index.html">Портал вакансий</a>
      <div class="mock-top-actions" id="top-actions"></div>
    </div>
  </header>
  <div class="mock-demo-strip">
    <div class="mock-demo-strip__inner">
      <div class="mock-demo-nav-scroll">
        <nav class="mock-demo-nav" aria-label="Основные разделы">
          <a href="index.html" class="mock-nav-item">Главная</a>
          <a href="vacancies.html" class="mock-nav-item">Вакансии</a>
          <a href="contacts.html" class="mock-nav-item">Контакты</a>
          <a href="seeker-dashboard.html" class="mock-nav-item">Соискатель</a>
          <a href="employer-dashboard.html" class="mock-nav-item">Работодатель</a>
          <a href="admin-users.html" class="mock-nav-item">Админ-панель</a>
          <a href="login.html" class="mock-nav-item" id="nav-auth-link">Вход / Регистрация</a>
        </nav>
      </div>
    </div>
  </div>
  <main class="mock-main">
    <div class="mock-auth-wrap">
      <div class="mock-auth-card mock-auth-card--split">
        <h1 class="mock-page-title" data-i18n="auth.login.title">Вход в личный кабинет</h1>
        <p class="mock-page-lead" data-i18n="auth.login.lead">Один вход для соискателей и работодателей.</p>

        <div class="mock-auth-role-tabs" role="tablist" aria-label="Кто входит">
          <button type="button" class="mock-auth-role-tabs__btn is-active" role="tab" aria-selected="true" data-auth-tab="seeker">
            <span data-i18n="auth.login.tabSeeker">Соискатель</span>
          </button>
          <button type="button" class="mock-auth-role-tabs__btn" role="tab" aria-selected="false" data-auth-tab="employer">
            <span data-i18n="auth.login.tabEmployer">Работодатель / партнёр</span>
          </button>
        </div>

        <div class="mock-auth-hint-stack">
          <section id="auth-hint-seeker" class="mock-auth-hint-panel" role="tabpanel">
            <h2 class="mock-auth-hint-panel__title" data-i18n="auth.login.hintSeekerTitle">Если вы ищете работу</h2>
            <div class="mock-auth-hint-panel__body" data-i18n-html="auth.login.hintSeekerHtml"></div>
          </section>
          <section id="auth-hint-employer" class="mock-auth-hint-panel" role="tabpanel" hidden>
            <h2 class="mock-auth-hint-panel__title" data-i18n="auth.login.hintEmployerTitle">Если вы нанимаете</h2>
            <div class="mock-auth-hint-panel__body" data-i18n-html="auth.login.hintEmployerHtml"></div>
          </section>
        </div>

        <ul class="mock-messages" id="auth-messages" style="display:none;" role="status"></ul>
        <form class="mock-form mock-form--wide" id="form-login" method="post" action="#">
          <div>
            <label for="login-user" data-i18n="auth.login.labelLogin">Логин</label>
            <input id="login-user" name="username" type="text" autocomplete="username" required autofocus data-i18n-placeholder="auth.login.phLogin">
          </div>
          <div>
            <label for="login-pass" data-i18n="auth.login.labelPass">Пароль</label>
            <input id="login-pass" name="password" type="password" autocomplete="current-password" required data-i18n-placeholder="auth.login.phPass">
          </div>
          <button type="submit" class="mock-btn mock-btn--primary" data-i18n="auth.login.submit">Войти</button>
        </form>
        <p class="mock-auth-footer">
          <span data-i18n="auth.login.footer">Нет аккаунта?</span>
          <a href="register.html" data-i18n="auth.login.footerLink">Регистрация</a>
        </p>
      </div>
    </div>
  </main>
  <footer class="mock-footer mock-footer--site" data-site-footer aria-label="Подвал сайта"></footer>
  <script src="js/i18n.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
