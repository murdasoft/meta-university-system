<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef2f0">
  <script src="js/theme.js"></script>
  <title>Вакансии — Портал вакансий</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="mock-job" data-page="vacancies">
  <header class="mock-topbar">
    <div class="mock-topbar__inner">
      <a class="mock-brand" href="index.html">Портал вакансий</a>
      <div class="mock-top-actions" id="top-actions"></div>
    </div>
  </header>
  <div class="mock-demo-strip">
    <div class="mock-demo-strip__inner">
      <div class="mock-demo-nav-scroll">
        <nav class="mock-demo-nav" aria-label="Основные разделы">
          <a href="index.html" class="mock-nav-item">Главная</a>
          <a href="vacancies.html" class="mock-nav-item">Вакансии</a>
          <a href="contacts.html" class="mock-nav-item">Контакты</a>
          <a href="seeker-dashboard.html" class="mock-nav-item">Соискатель</a>
          <a href="employer-dashboard.html" class="mock-nav-item">Работодатель</a>
          <a href="admin-users.html" class="mock-nav-item">Админ-панель</a>
          <a href="login.html" class="mock-nav-item" id="nav-auth-link">Вход / Регистрация</a>
        </nav>
      </div>
    </div>
  </div>
  <main class="mock-main">
    <header class="mock-catalog-head">
      <h1 class="mock-page-title">Вакансии</h1>
      <p class="mock-catalog-stats">
        В каталоге <strong id="catalog-total">—</strong> позиций
        <span id="filtered-wrap" style="display:none;"> · по фильтру: <strong id="filtered-count">—</strong></span>
      </p>
    </header>

    <div class="mock-quick-filters" id="quick-pills" aria-label="Быстрый выбор сферы"></div>

    <form class="mock-filter-panel" method="get" action="vacancies.html">
      <div class="mock-filter-panel__head">Расширенный поиск</div>
      <div class="mock-filter-grid">
        <label class="mock-filter-field">
          <span class="mock-filter-field__l">Ключевые слова</span>
          <input type="search" name="q" id="f-q" placeholder="Например: Python, склад" aria-label="Поиск">
        </label>
        <label class="mock-filter-field">
          <span class="mock-filter-field__l">Город / регион</span>
          <input type="text" name="city" id="f-city" placeholder="Начните ввод…" aria-label="Город" list="mock-cities-list">
        </label>
        <label class="mock-filter-field">
          <span class="mock-filter-field__l">Сфера</span>
          <select name="cat" id="f-cat" aria-label="Категория"></select>
        </label>
        <label class="mock-filter-field">
          <span class="mock-filter-field__l">Формат работы</span>
          <select name="fmt" id="f-fmt" aria-label="Формат">
            <option value="">Любой</option>
            <option value="office">Офис / на месте</option>
            <option value="remote">Удалённо</option>
            <option value="hybrid">Гибрид</option>
          </select>
        </label>
        <label class="mock-filter-field">
          <span class="mock-filter-field__l">Занятость</span>
          <select name="emp" id="f-emp" aria-label="Занятость">
            <option value="">Любая</option>
            <option value="full">Полная</option>
            <option value="part">Частичная / гибкий график</option>
            <option value="shift">Сменная</option>
            <option value="project">Проект</option>
          </select>
        </label>
      </div>
      <div class="mock-filter-panel__actions">
        <button type="submit" class="mock-btn mock-btn--primary">Показать результаты</button>
        <a class="mock-btn mock-btn--link" href="vacancies.html">Сбросить всё</a>
      </div>
    </form>

    <datalist id="mock-cities-list"></datalist>
    <div id="vacancies-list"></div>
  </main>
  <footer class="mock-footer mock-footer--site" data-site-footer aria-label="Подвал сайта"></footer>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/vacancies-page.js"></script>
</body>
</html>
