{% extends "job_portal_mock/base.dj.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="mock-auth-wrap">
  <div class="mock-auth-card">
    <h1 class="mock-page-title">Регистрация (тест)</h1>
    <p class="mock-page-lead">Создаётся только демо-сессия в браузере. Пароль и логин не сохраняются в базе проекта.</p>
    <form class="mock-form mock-form--wide" method="post" action="{% url 'job_portal_mock:register' %}">
      {% csrf_token %}
      <div>
        <label for="r_user">Логин</label>
        <input id="r_user" name="username" type="text" required minlength="2" placeholder="my_user" autocomplete="username">
      </div>
      <div>
        <label for="r_email">Email</label>
        <input id="r_email" name="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div>
        <label for="r_pass">Пароль (мин. 4 символа)</label>
        <input id="r_pass" name="password" type="password" required minlength="4" autocomplete="new-password">
      </div>
      <div>
        <label for="r_role">Роль</label>
        <select id="r_role" name="role">
          <option value="seeker">Соискатель</option>
          <option value="employer">Работодатель</option>
        </select>
      </div>
      <button type="submit" class="mock-btn mock-btn--primary">Создать демо-аккаунт</button>
    </form>
    <p class="mock-auth-footer">Уже есть тестовый вход? <a href="{% url 'job_portal_mock:login' %}">Войти</a></p>
  </div>
</div>
{% endblock %}
